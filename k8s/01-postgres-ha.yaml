apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: alphamind
spec:
  serviceName: postgres-headless
  replicas: 3
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: patroni
        image: patroni:latest
        env:
        - name: PATRONI_ETCD3_HOSTS
          value: "etcd:2379"
        - name: PATRONI_SCOPE
          value: "alphamind"
        - name: PATRONI_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: PATRONI_POSTGRESQL_DATA_DIR
          value: "/home/postgres/pgdata"
        - name: PATRONI_POSTGRESQL_PGPASS
          value: "/tmp/pgpass"
        - name: PATRONI_POSTGRESQL_LISTEN
          value: "0.0.0.0:5432"
        - name: PATRONI_RESTAPI_LISTEN
          value: "0.0.0.0:8008"
        - name: PATRONI_POSTGRESQL_CONNECT_ADDRESS
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: PGDATA
          value: "/home/postgres/pgdata"
        volumeMounts:
        - name: postgres-data
          mountPath: /home/postgres/pgdata
  volumeClaimTemplates:
  - metadata:
      name: postgres-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 10Gi
---
# headless service so that each replica can be reached directly for patroni
apiVersion: v1
kind: Service
metadata:
  name: postgres-headless
  namespace: alphamind
spec:
  clusterIP: None
  selector:
    app: postgres
  ports:
    - port: 5432
      name: postgres