apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: alphamind
type: Opaque
stringData:
  username: postgres
  password: "changeme-strong-password-here"  # Change in production!
  database: alphamind
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets
  namespace: alphamind
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: alphamind-external-secrets
  namespace: alphamind
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets
    kind: SecretStore
  target:
    name: alphamind-secrets
    creationPolicy: Owner
  data:
  - secretKey: JWT_SECRET
    remoteRef:
      key: alphamind/jwt_secret
  - secretKey: DEEPSEEK_API_KEY
    remoteRef:
      key: alphamind/deepseek_api_key
  - secretKey: OPENAI_API_KEY
    remoteRef:
      key: alphamind/openai_api_key
  - secretKey: EXNESS_API_KEY
    remoteRef:
      key: alphamind/exness_api_key
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets-sa
  namespace: alphamind
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: external-secrets-reader
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "watch", "create", "update"]
- apiGroups: ["external-secrets.io"]
  resources: ["externalsecrets"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: external-secrets-reader-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: external-secrets-reader
subjects:
- kind: ServiceAccount
  name: external-secrets-sa
  namespace: alphamind