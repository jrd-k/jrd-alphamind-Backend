name: CI

on:
  push:
  pull_request:

jobs:
  python-tests:
    name: Python tests (docker matrix)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11, 3.12]
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend test image
        run: |
          docker build \
            --tag backend-test:${{ matrix.python-version }} \
            --build-arg PYTHON_IMAGE=python:${{ matrix.python-version }}-slim \
            -f backend/Dockerfile .

      - name: Run backend tests inside container
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace/backend \
            backend-test:${{ matrix.python-version }} \
            bash -lc "pytest --cov=app --cov-report=xml:coverage.xml --junitxml=pytest-results.xml -q"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: backend/coverage.xml

      - name: Upload junit results
        uses: actions/upload-artifact@v4
        with:
          name: junit-${{ matrix.python-version }}
          path: backend/pytest-results.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  node-builds:
    name: Frontend tests & build (docker matrix)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run frontend build/tests inside Node container
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace/frontend \
            node:${{ matrix.node-version }} \
            bash -lc "npm ci && npm run build && npm test || true"

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-${{ matrix.node-version }}
          path: frontend/dist

  compose-integration:
    name: Compose integration (docker-compose)
    runs-on: ubuntu-latest
    needs: [python-tests, node-builds]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Compose (ensure plugin available)
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose-plugin jq curl

      - name: Build and start compose stack
        run: |
          docker compose -f docker-compose.dev.yml up -d --build

      - name: Wait for backend readiness
        run: |
          for i in $(seq 1 30); do
            if curl -sSf http://localhost:8000/docs >/dev/null; then
              echo "backend ready"; break
            fi
            echo "waiting for backend... ($i)"; sleep 2
          done

      - name: Run backend tests inside container (integration)
        run: |
          docker compose -f docker-compose.dev.yml run --rm backend pytest -q

      - name: Tear down
        if: always()
        run: |
          docker compose -f docker-compose.dev.yml down -v
