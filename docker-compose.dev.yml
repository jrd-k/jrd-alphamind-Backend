version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: pm
      POSTGRES_PASSWORD: pm
      POSTGRES_DB: alphamind
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql+psycopg2://pm:pm@postgres:5432/alphamind
      - REDIS_URL=redis://redis:6379/0
      - FRONTEND_ORIGINS=http://localhost:8081
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"

  frontend:
    image: node:20
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=http://backend:8000
    command: sh -c "npm install --no-audit --no-fund && npm run dev -- --host 0.0.0.0 --port 8081"
    ports:
      - "8081:8081"
    depends_on:
      - backend

volumes:
  db_data:
